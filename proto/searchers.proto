syntax = "proto3";
 
option csharp_namespace = "WbGrpc";

service WbParser {
  rpc Search (SearchRequest) returns (SearchResponse);
}

service OzonParser {
  rpc Search (OzonSearchRequest) returns (SearchResponse);
}

message OzonSearchRequest {
  string itemName = 1;
  int32 quantity = 2;
}

message SearchRequest {
  string itemName = 1;
  int32 page = 2;
}

message SearchResponse {
  int32 status = 1;
  string raw_json = 2;
}